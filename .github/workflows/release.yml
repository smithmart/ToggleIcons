name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish
        run: >
          dotnet publish src/toggle-icons.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output publish
          -p:PublishSingleFile=true
          -p:PublishTrimmed=true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/toggle-icons.exe
          generate_release_notes: true
